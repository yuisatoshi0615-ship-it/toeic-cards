<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111318">
<title>TOEIC単語帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#111318;--bg2:#181c24;--surface:#1e2330;--surface2:#252d3e;
  --border:rgba(255,255,255,0.07);--accent:#4f8aff;--rose:#ff6b8a;
  --gold:#fbbf24;--green:#34d399;--text:#e8eaf0;--text2:#8892a4;--text3:#505a6e;
  --r:18px;--shadow:0 24px 64px rgba(0,0,0,0.6);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
.screen{display:none;position:fixed;inset:0;flex-direction:column;background:var(--bg);overflow-y:auto;overflow-x:hidden}
.screen.active{display:flex}

/* NAV */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(17,19,24,0.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;flex-shrink:0}
.nav-left{display:flex;align-items:center;gap:10px}
.nav-back{background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer;padding:4px;line-height:1}
.nav-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:var(--text)}
.nav-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);margin-top:1px}
.nav-right{display:flex;gap:8px}
.nav-icon-btn{background:var(--surface);border:none;color:var(--text2);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.nav-icon-btn:active{transform:scale(.93);background:var(--surface2)}

/* HOME */
#home{padding-bottom:32px}
.home-hero{padding:28px 20px 20px;text-align:center}
.hero-logo{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.hero-title{font-family:'Outfit',sans-serif;font-size:30px;font-weight:800;line-height:1.15;color:var(--text)}
.hero-title span{color:var(--accent)}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 18px}
.stat{background:var(--surface);border-radius:14px;padding:14px 10px;text-align:center;border:1px solid var(--border)}
.stat-n{font-family:'Outfit',sans-serif;font-size:26px;font-weight:800;color:var(--accent);line-height:1}
.stat-n.rose{color:var(--rose)}.stat-n.gold{color:var(--gold)}
.stat-l{font-size:10px;color:var(--text2);margin-top:3px}
.section-head{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:0 20px;margin-top:20px;margin-bottom:10px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 18px}
.mode-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;cursor:pointer;text-align:left;transition:all .2s;display:flex;flex-direction:column;gap:6px}
.mode-btn:active{transform:scale(.96)}
.mode-btn.full{grid-column:span 2;flex-direction:row;align-items:center;gap:14px}
.mode-btn.a{border-color:rgba(79,138,255,.3);background:linear-gradient(135deg,rgba(79,138,255,.1),rgba(79,138,255,.03))}
.mode-btn.b{border-color:rgba(255,107,138,.25);background:linear-gradient(135deg,rgba(255,107,138,.08),rgba(255,107,138,.02))}
.mode-btn.c{border-color:rgba(251,191,36,.2);background:linear-gradient(135deg,rgba(251,191,36,.07),rgba(251,191,36,.01))}
.mode-icon{font-size:26px;flex-shrink:0}
.mode-label{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;color:var(--text)}
.mode-desc{font-size:11px;color:var(--text2);line-height:1.5}
.deck-list{padding:0 18px;display:flex;flex-direction:column;gap:8px}
.deck-row{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.deck-row:active{transform:scale(.98);background:var(--surface2)}
.deck-row.recent-deck{border-color:rgba(251,191,36,.3);background:linear-gradient(135deg,rgba(251,191,36,.06),rgba(251,191,36,.01))}
.deck-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.deck-dot.recent{background:var(--gold)}
.deck-info{flex:1}
.deck-name{font-family:'Outfit',sans-serif;font-weight:600;font-size:14px}
.deck-count{font-size:11px;color:var(--text2);margin-top:2px}
.deck-prog{font-family:'Space Mono',monospace;font-size:11px;color:var(--text3)}
.recent-badge{font-size:9px;background:rgba(251,191,36,.2);color:var(--gold);padding:2px 6px;border-radius:6px;font-family:'Outfit',sans-serif;font-weight:700}

/* STUDY */
#study{overflow:hidden}
.study-progress{padding:10px 18px 8px;flex-shrink:0}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.prog-bar{flex:1;height:3px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--rose));border-radius:3px;transition:width .4s ease}
.prog-txt{font-family:'Space Mono',monospace;font-size:10px;color:var(--text2);white-space:nowrap}
.mode-tag{display:inline-block;font-size:10px;font-family:'Outfit',sans-serif;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:2px 8px;border-radius:6px;background:rgba(79,138,255,.15);color:var(--accent)}
.mode-tag.weak{background:rgba(255,107,138,.15);color:var(--rose)}
.card-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 18px;perspective:1400px;overflow:hidden}
.card-outer{width:100%;max-width:420px;display:flex;align-items:center;margin-bottom:8px;padding:0 4px;}
.card-wrap{width:100%;max-width:420px;height:min(62vw,340px);position:relative;cursor:pointer}
.flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.flashcard.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:22px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;flex-direction:column;padding:22px 22px 18px;overflow:hidden;box-shadow:var(--shadow)}
.face-front{background:linear-gradient(145deg,#1e2538,#242c40);border:1px solid rgba(79,138,255,.18)}
.face-back{background:linear-gradient(145deg,#1e2530,#222c3c);border:1px solid rgba(255,107,138,.15);transform:rotateY(180deg)}
.face::after{content:'';position:absolute;bottom:-50px;left:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(79,138,255,.07) 0%,transparent 70%);pointer-events:none}
.face-back::after{background:radial-gradient(circle,rgba(255,107,138,.06) 0%,transparent 70%)}
.card-corner{position:absolute;top:14px;right:14px}
.speak-btn{background:rgba(79,138,255,.12);border:none;color:var(--accent);width:32px;height:32px;border-radius:10px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.speak-btn:active{transform:scale(.9);background:rgba(79,138,255,.25)}
.speak-btn.playing{color:var(--green);background:rgba(52,211,153,.15)}
.prev-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);width:38px;height:38px;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
.prev-btn:active{transform:scale(.9);background:rgba(255,255,255,.18);}
.prev-btn:disabled{opacity:.2;cursor:default;}

/* FRONT card */
.card-deck-tag{font-family:'Space Mono',monospace;font-size:9px;color:var(--text3);letter-spacing:.08em;margin-bottom:4px}
.card-kana{font-size:11px;color:var(--text2);letter-spacing:.05em;min-height:16px;margin-bottom:2px}
.card-word{font-family:'Outfit',sans-serif;font-size:clamp(28px,7vw,46px);font-weight:800;letter-spacing:.01em;color:var(--text);line-height:1.2;flex:1;display:flex;align-items:center;word-break:break-all}
.card-comment{font-size:11px;color:var(--text3);line-height:1.5;margin-top:auto;padding-top:8px;border-top:1px solid var(--border);min-height:18px}

/* BACK card */
.back-kana{font-size:11px;color:var(--text2);margin-bottom:3px}
.back-word{font-family:'Outfit',sans-serif;font-size:clamp(15px,3.5vw,20px);font-weight:700;color:var(--text);margin-bottom:10px}
.back-pos{display:inline-block;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;padding:3px 10px;border-radius:20px;background:rgba(79,138,255,.15);color:var(--accent);margin-bottom:10px}
.back-meaning{font-size:clamp(22px,5.5vw,32px);font-weight:700;color:var(--text);line-height:1.4;flex:1;display:flex;align-items:center}
.back-comment{font-size:11px;color:var(--text3);line-height:1.5;margin-top:auto;padding-top:8px;border-top:1px solid var(--border)}
.flip-hint{text-align:center;font-size:11px;color:var(--text3);margin-top:8px;display:flex;align-items:center;justify-content:center;gap:4px}

/* ACTIONS - 苦手／覚えた／次へ順 */
.actions{display:flex;gap:12px;padding:8px 18px 16px;flex-shrink:0}
.act-btn{flex:1;border:none;border-radius:16px;padding:14px 10px;cursor:pointer;font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s}
.act-btn:active{transform:scale(.95)}
.act-weak{background:rgba(255,107,138,.1);color:var(--rose);border:1px solid rgba(255,107,138,.2)}
.act-known{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.2)}
.act-skip{background:var(--surface);color:var(--text2);border:1px solid var(--border)}
.act-btn .act-icon{font-size:20px}
.act-btn .act-lbl{font-size:11px}

/* MANAGE */
#manage{overflow-y:auto}
.manage-body{padding:14px 18px 40px;display:flex;flex-direction:column;gap:12px}
.add-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:10px}
.add-form h3{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;margin-bottom:2px}
.form-row{display:flex;gap:8px}
.form-row input,.form-row select{flex:1}
input[type=text],select,textarea{background:var(--bg2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;padding:10px 12px;outline:none;transition:border .2s;width:100%}
input[type=text]:focus,select:focus,textarea:focus{border-color:var(--accent)}
select option{background:var(--surface)}
.btn-add{background:var(--accent);border:none;color:#fff;border-radius:12px;padding:12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
.btn-add:active{transform:scale(.97);opacity:.9}
.word-table{display:flex;flex-direction:column;gap:6px}
.word-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.word-row.weak-row{border-color:rgba(255,107,138,.2)}
.word-main{flex:1;min-width:0}
.word-en{font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.word-jp{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.word-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;opacity:.6;transition:opacity .2s}
.icon-btn:active{opacity:1}
.search-box{position:relative}
.search-box input{padding-left:36px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.filter-row{display:flex;gap:8px}
.filter-chip{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:12px;cursor:pointer;color:var(--text2);transition:all .2s;white-space:nowrap}
.filter-chip.on{background:rgba(79,138,255,.15);border-color:rgba(79,138,255,.4);color:var(--accent)}

/* RESULT */
#result{align-items:center;justify-content:center;padding:20px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px 24px;width:100%;max-width:420px;text-align:center}
.result-emoji{font-size:52px;margin-bottom:16px}
.result-title{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800;margin-bottom:8px}
.result-sub{color:var(--text2);font-size:14px;line-height:1.6;margin-bottom:24px}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:24px}
.res-stat{background:var(--bg2);border-radius:12px;padding:12px 8px}
.res-n{font-family:'Outfit',sans-serif;font-size:24px;font-weight:800}
.res-n.g{color:var(--green)}.res-n.r{color:var(--rose)}
.res-l{font-size:10px;color:var(--text2);margin-top:2px}
.result-btns{display:flex;flex-direction:column;gap:10px}
.btn-primary{background:var(--accent);border:none;color:#fff;border-radius:14px;padding:14px;font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:all .2s}
.btn-primary:active{transform:scale(.97)}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:14px;padding:13px;font-family:'Outfit',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:all .2s}
.btn-secondary:active{transform:scale(.97)}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;font-size:13px;color:var(--text);z-index:999;transition:transform .3s ease;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.import-area{border:2px dashed var(--border);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text2);font-size:13px}
.import-area:hover{border-color:var(--accent);color:var(--accent)}
.import-area input{display:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}
@keyframes swipeRight{to{transform:translateX(120%) rotate(12deg);opacity:0}}
@keyframes swipeLeft{to{transform:translateX(-120%) rotate(-12deg);opacity:0}}
.swiping-right .flashcard{animation:swipeRight .28s ease forwards}
.swiping-left .flashcard{animation:swipeLeft .28s ease forwards}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="topnav">
    <div>
      <div class="nav-title">TOEIC 単語帳</div>
      <div class="nav-sub" id="homeSubtitle">Loading...</div>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="goManage()">⚙️</button>
    </div>
  </div>
  <div class="home-hero">
    <div class="hero-logo">Your Vocabulary Deck</div>
    <div class="hero-title">覚えて、<span>超えよう。</span></div>
  </div>
  <div class="stats-bar">
    <div class="stat"><span class="stat-n" id="statTotal">0</span><div class="stat-l">総単語数</div></div>
    <div class="stat"><span class="stat-n rose" id="statWeak">0</span><div class="stat-l">苦手単語</div></div>
    <div class="stat"><span class="stat-n gold" id="statDecks">0</span><div class="stat-l">デッキ数</div></div>
  </div>
  <div class="section-head">学習モード</div>
  <div class="mode-grid">
    <button class="mode-btn a" onclick="startStudy('all')">
      <div class="mode-icon">🃏</div>
      <div class="mode-label">全単語</div>
      <div class="mode-desc">全語をランダムに学習</div>
    </button>
    <button class="mode-btn b" onclick="startStudy('weak')">
      <div class="mode-icon">🔥</div>
      <div class="mode-label">苦手だけ</div>
      <div class="mode-desc">苦手マークした単語のみ</div>
    </button>
    <button class="mode-btn c full" onclick="showDeckSelect()">
      <div class="mode-icon">📂</div>
      <div><div class="mode-label">デッキ別</div><div class="mode-desc">デッキを選んで学習</div></div>
    </button>
  </div>
  <div class="section-head" style="margin-top:20px" id="recentSectionHead" style="display:none">⏱ 24時間以内に学習したデッキ</div>
  <div class="deck-list" id="recentDeckList"></div>
  <div class="section-head" style="margin-top:16px">デッキ一覧</div>
  <div class="deck-list" id="deckList"></div>
</div>

<!-- STUDY -->
<div class="screen" id="study">
  <div class="topnav">
    <div class="nav-left">
      <button class="nav-back" onclick="goHome()">←</button>
      <div>
        <div class="nav-title" id="studyTitle">学習中</div>
        <div class="nav-sub" id="studyDeckLabel"></div>
      </div>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="shuffleDeck()">🔀</button>
    </div>
  </div>
  <div class="study-progress">
    <div class="prog-row">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-txt" id="progTxt">0 / 0</div>
    </div>
    <span class="mode-tag" id="modeTag">全単語</span>
  </div>
  <div class="card-area" id="cardArea">
    <div class="card-outer">
      <button class="prev-btn" id="prevBtn" onclick="prevCard()" title="前のカードに戻る">←</button>
    </div>
    <div class="card-wrap" id="cardWrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="face face-front">
          <div class="card-corner">
            <button class="speak-btn" id="speakFront" onclick="event.stopPropagation();speak()">🔊</button>
          </div>
          <div class="card-deck-tag" id="frontDeck"></div>
          <div class="card-kana" id="frontKana"></div>
          <div class="card-word" id="frontWord"></div>
          <div class="card-comment" id="frontComment"></div>
        </div>
        <div class="face face-back">
          <div class="card-corner">
            <button class="speak-btn" id="speakBack" onclick="event.stopPropagation();speak()">🔊</button>
          </div>
          <div class="back-kana" id="backKana"></div>
          <div class="back-word" id="backWord"></div>
          <div class="back-pos" id="backPos"></div>
          <div class="back-meaning" id="backMeaning"></div>
          <div class="back-comment" id="backComment"></div>
        </div>
      </div>
    </div>
    <div class="flip-hint" id="flipHint">👆 タップしてめくる</div>
  </div>
  <!-- 苦手 / 覚えた / 次へ の順 -->
  <div class="actions">
    <button class="act-btn act-weak" onclick="markWeak()">
      <span class="act-icon">🔥</span><span class="act-lbl">苦手</span>
    </button>
    <button class="act-btn act-known" onclick="markKnown()">
      <span class="act-icon">✓</span><span class="act-lbl">覚えた</span>
    </button>
    <button class="act-btn act-skip" onclick="nextCard(true)">
      <span class="act-icon">→</span><span class="act-lbl">次へ</span>
    </button>
  </div>
</div>

<!-- MANAGE -->
<div class="screen" id="manage">
  <div class="topnav">
    <div class="nav-left">
      <button class="nav-back" onclick="goHome()">←</button>
      <div><div class="nav-title">単語管理</div></div>
    </div>
    <div class="nav-right">
      <button class="nav-icon-btn" onclick="exportCSV()">📤</button>
    </div>
  </div>
  <div class="manage-body">
    <div class="add-form">
      <h3>➕ 単語を追加</h3>
      <input type="text" id="newWord" placeholder="英単語 / フレーズ">
      <input type="text" id="newKana" placeholder="カタカナよみがな">
      <div class="form-row">
        <input type="text" id="newPos" placeholder="品詞（名・動・形…）" style="flex:.5">
        <input type="text" id="newMeaning" placeholder="意味（日本語）">
      </div>
      <input type="text" id="newComment" placeholder="備考（任意）">
      <div class="form-row">
        <select id="newDeck"><option value="new">新しいデッキ…</option></select>
        <input type="text" id="newDeckName" placeholder="デッキ名" style="display:none">
      </div>
      <button class="btn-add" onclick="addWord()">追加する</button>
    </div>
    <div class="import-area" onclick="document.getElementById('csvFile').click()">
      <input type="file" id="csvFile" accept=".csv" onchange="importCSV(this)">

// ── STATE ────────────────────────────────────────────
let words=[], deck=[], idx=0, isFlipped=false;
let sessionKnown=0, sessionWeak=0, sessionSkip=0;
let studyMode='all', studyDeckId=null;
let filterDeck='all', filterWeak=false;
const synth=window.speechSynthesis;
let voices=[];

function loadData(){
  const saved=localStorage.getItem('toeic_v2');
  const weakMap=JSON.parse(localStorage.getItem('toeic_weak')||'{}');
  words=saved?JSON.parse(saved):RAW.map(w=>({...w,weak:false}));
  words.forEach(w=>{ w.weak=!!weakMap[w.id]; });
  // ensure kana exists
  words.forEach(w=>{ if(!w.kana) w.kana=''; });
}
function saveData(){
  localStorage.setItem('toeic_v2',JSON.stringify(words));
  const m={};words.forEach(w=>{if(w.weak)m[w.id]=true;});
  localStorage.setItem('toeic_weak',JSON.stringify(m));
}
function saveDeckStudied(deckId){
  const key='toeic_studied';
  const map=JSON.parse(localStorage.getItem(key)||'{}');
  map[deckId]=Date.now();
  localStorage.setItem(key,JSON.stringify(map));
}
function getRecentDecks(){
  const map=JSON.parse(localStorage.getItem('toeic_studied')||'{}');
  const cutoff=Date.now()-24*60*60*1000;
  return Object.entries(map).filter(([,t])=>t>cutoff).map(([d])=>d);
}

// ── SPEECH ───────────────────────────────────────────
function loadVoices(){voices=synth.getVoices().filter(v=>v.lang.startsWith('en'));if(!voices.length)setTimeout(loadVoices,300);}
loadVoices();
if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;
function speak(){
  if(!synth)return;synth.cancel();
  const card=deck[idx];if(!card)return;
  const utt=new SpeechSynthesisUtterance(card.word);
  utt.lang='en-US';utt.rate=0.88;
  if(voices.length)utt.voice=voices[0];
  const btns=document.querySelectorAll('.speak-btn');
  btns.forEach(b=>b.classList.add('playing'));
  utt.onend=()=>btns.forEach(b=>b.classList.remove('playing'));
  synth.speak(utt);
}

// ── HOME ─────────────────────────────────────────────
function updateHome(){
  const total=words.length;
  const weak=words.filter(w=>w.weak).length;
  const decks=[...new Set(words.map(w=>w.deck))];
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statWeak').textContent=weak;
  document.getElementById('statDecks').textContent=decks.length;
  document.getElementById('homeSubtitle').textContent=`${total}語 · ${decks.length}デッキ`;

  // recent decks
  const recent=getRecentDecks();
  const rHead=document.getElementById('recentSectionHead');
  const rList=document.getElementById('recentDeckList');
  if(recent.length){
    rHead.style.display='';
    rList.innerHTML=recent.sort().map(d=>{
      const dw=words.filter(w=>w.deck===d);
      return `<div class="deck-row recent-deck" onclick="startStudy('deck','${d}')">
        <div class="deck-dot recent"></div>
        <div class="deck-info"><div class="deck-name">デッキ ${d}</div><div class="deck-count">${dw.length}語</div></div>
        <span class="recent-badge">最近</span>
      </div>`;
    }).join('');
  } else {
    rHead.style.display='none';
    rList.innerHTML='';
  }

  // all decks
  document.getElementById('deckList').innerHTML=decks.sort().map(d=>{
    const dw=words.filter(w=>w.deck===d);
    const wk=dw.filter(w=>w.weak).length;
    return `<div class="deck-row" onclick="startStudy('deck','${d}')">
      <div class="deck-dot"></div>
      <div class="deck-info"><div class="deck-name">デッキ ${d}</div><div class="deck-count">${dw.length}語${wk?` · 苦手${wk}語`:''}</div></div>
      <div class="deck-prog">→</div>
    </div>`;
  }).join('');

  // populate deck select in manage
  const sel=document.getElementById('newDeck');
  const cur=sel.value;
  sel.innerHTML=decks.sort().map(d=>`<option value="${d}">デッキ ${d}</option>`).join('')
    +'<option value="new">新しいデッキ…</option>';
  sel.value=cur||decks[0]||'new';
}

// ── STUDY ─────────────────────────────────────────────
function startStudy(mode,deckId){
  studyMode=mode;studyDeckId=deckId||null;
  sessionKnown=sessionWeak=sessionSkip=0;
  if(mode==='all') deck=shuffle([...words]);
  else if(mode==='weak'){
    deck=shuffle(words.filter(w=>w.weak));
    if(!deck.length){showToast('苦手単語がありません');return;}
  } else {
    deck=shuffle(words.filter(w=>w.deck===deckId));
    saveDeckStudied(deckId);
  }
  idx=0;showScreen('study');
  const tag=document.getElementById('modeTag');
  tag.className='mode-tag'+(mode==='weak'?' weak':'');
  tag.textContent=mode==='all'?'全単語':mode==='weak'?'苦手単語':`デッキ ${deckId}`;
  document.getElementById('studyTitle').textContent=mode==='deck'?`デッキ ${deckId}`:mode==='weak'?'苦手復習':'全単語';
  document.getElementById('studyDeckLabel').textContent=`${deck.length}語`;
  renderCard();
}
function showDeckSelect(){ /* same as clicking deck list on home - scroll down */ }

function renderCard(){
  if(idx>=deck.length){showResult();return;}
  const card=deck[idx];
  isFlipped=false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('flipHint').style.opacity='1';
  const pct=(idx/deck.length)*100;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progTxt').textContent=`${idx+1} / ${deck.length}`;
  // front
  document.getElementById('frontDeck').textContent=`DECK ${card.deck}`;
  document.getElementById('frontKana').textContent=card.kana||'';
  document.getElementById('frontWord').textContent=card.word;
  document.getElementById('frontComment').textContent=card.comment||'';
  // back
  document.getElementById('backKana').textContent=card.kana||'';
  document.getElementById('backWord').textContent=card.word;
  document.getElementById('backPos').textContent=card.pos?`【${card.pos}】`:'—';
  document.getElementById('backMeaning').textContent=card.meaning;
  document.getElementById('backComment').textContent=card.comment||'';
  document.getElementById('cardWrap').style.filter=card.weak?'drop-shadow(0 0 12px rgba(255,107,138,.35))':'none';
  // 戻るボタンの有効/無効
  const prevBtn=document.getElementById('prevBtn');
  if(prevBtn) prevBtn.disabled=(idx===0);
  // 新カード表示時に自動音声再生（少し遅延してアニメ後に再生）
  setTimeout(()=>speak(), 320);
}

function flipCard(){
  isFlipped=!isFlipped;
  document.getElementById('flashcard').classList.toggle('flipped',isFlipped);
  if(isFlipped)document.getElementById('flipHint').style.opacity='0';
}
function prevCard(){
  if(idx<=0)return;
  synth.cancel();
  idx--;
  // 裏返っていたらリセット
  isFlipped=false;
  document.getElementById('flashcard').classList.remove('flipped');
  renderCard();
}
function markKnown(){sessionKnown++;swipeCard('right');}
function markWeak(){
  const card=deck[idx];
  const w=words.find(x=>x.id===card.id);
  if(w){w.weak=true;card.weak=true;saveData();}
  sessionWeak++;swipeCard('left');
}
function nextCard(counted){if(counted)sessionSkip++;swipeCard('left');}
function swipeCard(dir){
  const wrap=document.getElementById('cardWrap');
  wrap.classList.add(dir==='right'?'swiping-right':'swiping-left');
  setTimeout(()=>{wrap.classList.remove('swiping-right','swiping-left');idx++;renderCard();},280);
}
function shuffleDeck(){deck=shuffle([...deck].slice(idx));idx=0;renderCard();showToast('シャッフルしました');}

// ── RESULT ────────────────────────────────────────────
function showResult(){
  showScreen('result');
  document.getElementById('resKnown').textContent=sessionKnown;
  document.getElementById('resWeak').textContent=sessionWeak;
  document.getElementById('resSkip').textContent=sessionSkip;
  const total=sessionKnown+sessionWeak+sessionSkip;
  const pct=total?Math.round(sessionKnown/total*100):0;
  let emoji='🎉',title='お疲れ様！';
  if(pct>=80){emoji='🏆';title='素晴らしい！';}
  else if(pct>=60){emoji='👍';title='いい調子！';}
  else{emoji='💪';title='もう一頑張り！';}
  document.getElementById('resultEmoji').textContent=emoji;
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultSub').textContent=`正解率 ${pct}% · ${total}語学習`;
}
function restartStudy(){startStudy(studyMode,studyDeckId);}
function studyWeak(){startStudy('weak');}

// ── MANAGE ────────────────────────────────────────────
function goManage(){showScreen('manage');renderFilterChips();renderWordList();
  document.getElementById('newDeck').onchange=function(){
    document.getElementById('newDeckName').style.display=this.value==='new'?'block':'none';
  };
}
function renderFilterChips(){
  const decks=[...new Set(words.map(w=>w.deck))].sort();
  document.getElementById('filterChips').innerHTML=
    `<div class="filter-chip ${filterDeck==='all'?'on':''}" onclick="setFilter('all')">すべて</div>`+
    `<div class="filter-chip ${filterWeak?'on':''}" onclick="toggleWeakFilter()">🔥 苦手</div>`+
    decks.map(d=>`<div class="filter-chip ${filterDeck===d?'on':''}" onclick="setFilter('${d}')">デッキ${d}</div>`).join('');
}
function setFilter(d){filterDeck=d;renderFilterChips();renderWordList();}
function toggleWeakFilter(){filterWeak=!filterWeak;renderFilterChips();renderWordList();}
function renderWordList(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  let list=words;
  if(filterDeck!=='all')list=list.filter(w=>w.deck===filterDeck);
  if(filterWeak)list=list.filter(w=>w.weak);
  if(q)list=list.filter(w=>w.word.toLowerCase().includes(q)||w.meaning.includes(q));
  document.getElementById('wordTable').innerHTML=list.map(w=>`
    <div class="word-row ${w.weak?'weak-row':''}">
      <div class="word-main">
        <div class="word-en">${w.word}${w.weak?' 🔥':''}</div>
        <div class="word-jp">${w.pos?`【${w.pos}】`:''}${w.meaning}</div>
      </div>
      <div class="word-actions">
        <button class="icon-btn" onclick="toggleWeakWord(${w.id})">${w.weak?'❤️‍🔥':'🤍'}</button>
        <button class="icon-btn" onclick="editWord(${w.id})">✏️</button>
        <button class="icon-btn" onclick="deleteWord(${w.id})">🗑️</button>
      </div>
    </div>`).join('');
}
function addWord(){
  const word=document.getElementById('newWord').value.trim();
  const kana=document.getElementById('newKana').value.trim();
  const pos=document.getElementById('newPos').value.trim();
  const meaning=document.getElementById('newMeaning').value.trim();
  const comment=document.getElementById('newComment').value.trim();
  let deckVal=document.getElementById('newDeck').value;
  if(deckVal==='new')deckVal=document.getElementById('newDeckName').value.trim()||'new';
  if(!word||!meaning){showToast('英単語と意味は必須です');return;}
  const newId=Math.max(...words.map(w=>w.id),0)+1;
  words.push({id:newId,word,kana,pos,meaning,comment,deck:deckVal,weak:false});
  saveData();
  ['newWord','newKana','newPos','newMeaning','newComment'].forEach(id=>document.getElementById(id).value='');
  renderWordList();renderFilterChips();updateHome();
  showToast(`「${word}」を追加しました`);
}
function toggleWeakWord(id){const w=words.find(x=>x.id===id);if(w){w.weak=!w.weak;saveData();renderWordList();updateHome();}}
function editWord(id){
  const w=words.find(x=>x.id===id);if(!w)return;
  const nw=prompt('英単語:',w.word);if(nw===null)return;
  const nm=prompt('意味:',w.meaning);if(nm===null)return;
  const nk=prompt('カタカナよみがな:',w.kana||'');
  const np=prompt('品詞:',w.pos);
  const nc=prompt('備考:',w.comment);
  w.word=nw.trim()||w.word;w.meaning=nm.trim()||w.meaning;
  if(nk!==null)w.kana=nk.trim();
  if(np!==null)w.pos=np.trim();
  if(nc!==null)w.comment=nc.trim();
  saveData();renderWordList();showToast('更新しました');
}
function deleteWord(id){
  if(!confirm('この単語を削除しますか？'))return;
  words=words.filter(x=>x.id!==id);saveData();renderWordList();updateHome();showToast('削除しました');
}
function exportCSV(){
  const rows=[['FrontText','BackText','Comment','Kana','Deck']];
  words.forEach(w=>rows.push([w.word,`【${w.pos}】${w.meaning}`,w.comment,w.kana||'',w.deck]));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='toeic_export.csv';a.click();
  showToast('CSVをエクスポートしました');
}
function importCSV(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split(/\r?\n/).filter(Boolean);
    let added=0;const maxId=Math.max(...words.map(w=>w.id),0);
    lines.slice(1).forEach((line,i)=>{
      const cols=parseCSVLine(line);
      const word=(cols[0]||'').trim();const back=(cols[1]||'').trim();
      const comment=(cols[2]||'').trim();const kana=(cols[3]||'').trim();
      if(!word)return;
      const pm=back.match(/【(.+?)】(.+)/);
      const pos=pm?pm[1]:'';const meaning=pm?pm[2].trim():back;
      words.push({id:maxId+i+1,word,kana,pos,meaning,comment,deck:'imported',weak:false});
      added++;
    });
    saveData();renderWordList();renderFilterChips();updateHome();
    showToast(`${added}語インポートしました`);input.value='';
  };
  reader.readAsText(file,'utf-8');
}
function parseCSVLine(line){
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(line[i]===','&&!inQ){r.push(cur);cur='';}
    else cur+=line[i];
  }r.push(cur);return r;
}

// ── UTILS ────────────────────────────────────────────
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goHome(){showScreen('home');updateHome();}
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

// swipe
let tx=0,ty=0;
document.getElementById('cardWrap').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('cardWrap').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>50){if(dx>0)markKnown();else nextCard(true);}
},{passive:true});
document.addEventListener('keydown',e=>{
  if(!document.getElementById('study').classList.contains('active'))return;
  if(e.key===' '){e.preventDefault();flipCard();}
  else if(e.key==='ArrowRight')markKnown();
  else if(e.key==='ArrowLeft')nextCard(true);
  else if(e.key==='ArrowDown')markWeak();
});

function getRandMsg(hour){
  const list=NOTIF_MESSAGES[hour];
  return list[Math.floor(Math.random()*list.length)];
}

async function initNotifications(){
  if(!('Notification' in window))return;
  if(Notification.permission==='default'){
    await Notification.requestPermission();
  }
  if(Notification.permission==='granted'){
    scheduleNotifications();
  }
}

function scheduleNotifications(){
  if(sessionStorage.getItem('notif_scheduled'))return;
  sessionStorage.setItem('notif_scheduled','1');
  const targets=[12,15,18,21];
  const now=new Date();
  targets.forEach(hour=>{
    const target=new Date();
    target.setHours(hour,0,0,0);
    const diff=target-now;
    if(diff>0){
      setTimeout(()=>{
        if(Notification.permission==='granted'){
          new Notification('📚 TOEIC単語帳',{
            body:getRandMsg(hour),
            tag:`toeic-${hour}`,
            renotify:true
          });
        }
      },diff);
    }
  });
}
